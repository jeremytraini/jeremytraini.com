- id: collegeconnector
  title: College Connector
  subtitle: Digital Wayfinding Solution
  description: >-
    I created College Connector as a modern solution to an age-old problem: navigating
    expansive school campuses. Recognising the need for a user-friendly and precise
    tool, I integrated an intuitive touch interface and incorporated the A* search
    algorithm for advanced pathfinding. This tool not only streamlines the campus
    experience for students and parents but also embodies my dedication to creating
    technology that promote an equitable future. I am currently liaising with key
    stakeholders to initiate a pilot program for the interactive kiosk within a school
    campus.
  technologies:
    - Java
    - Greenfoot
