name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Build
        run: npm run build